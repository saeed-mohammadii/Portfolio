faq:
  title: Frequently Asked Questions
  description: Answers to common questions about my process and services.
  categories:
    - title: Services & Process
      questions:
        - label: What services do you offer?
          content: |
            I build modern web applications using Vue.js, Nuxt.js, TypeScript, and modern frontend tools. Whether you need a project built from scratch, a design implemented from Figma, or an existing application improved, I focus on creating fast, responsive, and maintainable solutions.
        - label: What technologies do you work with?
          content: |
           I primarily work with Vue.js, Nuxt.js, TypeScript, JavaScript, HTML, CSS, Tailwind CSS, Git, and modern frontend development tools.
        - label: Can you work with existing projects?
          content: |
            Yes. I can join existing projects, implement new features, improve performance, fix bugs, refactor code, and help maintain scalable frontend applications.
        # - label: Do you work with startups?
        #   content: |
        #     Absolutely! I enjoy working with startups to help shape their product vision and create user-friendly interfaces from the ground up. I can adapt my process to fit the fast-paced startup environment.
