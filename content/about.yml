title: About Me
description: Frontend developer passionate about solving complex problems and building clean, efficient, and scalable web applications with modern JavaScript frameworks.
content: |
  Passionate Frontend Developer with solid experience in building modern web applications using Vue.js, Nuxt.js, React.js, Next.js, TypeScript, and JavaScript. Skilled in UI implementation, component-based architecture, performance optimization, and scalable frontend development, with a strong willingness to learn and master software architecture, backend technologies, and modern engineering practices. Frontend engineering and problem-solving enthusiast with a deep understanding of how web technologies work behind the scenes.
